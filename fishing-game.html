<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎣 Pixel Fisher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a1a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
  canvas { display: block; image-rendering: pixelated; }

  #ui {
    position: fixed; top: 10px; left: 10px; color: #fff;
    font-size: 11px; text-shadow: 1px 1px #000;
    background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px;
    border: 2px solid #4af; line-height: 1.9;
  }
  #ui.touch-mode { display: none; }

  #msg {
    position: fixed; bottom: 145px; left: 50%; transform: translateX(-50%);
    color: #ffe77a; font-size: 15px; text-shadow: 2px 2px #000;
    background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px;
    border: 2px solid #ffe77a; pointer-events: none;
    opacity: 0; transition: opacity 0.4s; white-space: nowrap; z-index: 100;
  }
  #msg.show { opacity: 1; }

  #score-pill {
    position: fixed; top: 10px; right: 10px;
    background: rgba(0,0,0,0.55); border: 2px solid #4af;
    color: #fff; font-size: 13px; padding: 6px 14px;
    border-radius: 20px; text-shadow: 1px 1px #000; z-index: 60;
  }

  /* ── TOUCH HUD ── */
  #touch-hud {
    display: none; position: fixed;
    bottom: 0; left: 0; right: 0; height: 155px;
    pointer-events: none; z-index: 50;
  }
  #touch-hud.visible { display: block; }

  #joystick-zone {
    position: absolute; left: 18px; bottom: 18px;
    width: 110px; height: 110px; pointer-events: all;
  }
  #joystick-base {
    width: 110px; height: 110px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 3px solid rgba(255,255,255,0.22);
    position: relative;
  }
  #joystick-knob {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(100,200,255,0.65);
    border: 3px solid rgba(180,240,255,0.85);
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 12px rgba(100,200,255,0.45);
  }

  #right-btns {
    position: absolute; right: 16px; bottom: 14px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    pointer-events: all;
  }
  .touch-btn {
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 3px solid rgba(255,255,255,0.28);
    background: rgba(0,0,0,0.42);
    cursor: pointer; user-select: none;
    transition: transform 0.1s, background 0.1s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }
  .touch-btn.pressed { transform: scale(0.86); }

  #btn-cast {
    width: 68px; height: 68px; font-size: 26px;
    background: rgba(255,200,0,0.22);
    border-color: rgba(255,220,60,0.7);
    box-shadow: 0 0 16px rgba(255,200,0,0.3);
  }
  .reel-row { display: flex; gap: 8px; }
  #btn-reel-in, #btn-reel-out {
    width: 56px; height: 56px; font-size: 18px;
    line-height: 1.1;
  }
  #btn-reel-in {
    background: rgba(0,200,120,0.2);
    border-color: rgba(0,230,140,0.6);
  }
  .btn-label { font-size: 8px; color: rgba(255,255,255,0.75); margin-top: 1px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  🚢 <b>↑↓←→</b> Naviguer<br>
  🎣 <b>Souris</b> Viser<br>
  🖱️ <b>Clic droit</b> Lancer<br>
  🔄 <b>Molette</b> Ligne<br>
  🐟 Pris : <b id="score-desk">0</b>
</div>

<div id="score-pill">🐟 <b id="score">0</b></div>
<div id="msg"></div>

<div id="touch-hud">
  <!-- Left: joystick -->
  <div id="joystick-zone">
    <div id="joystick-base"><div id="joystick-knob"></div></div>
  </div>
  <!-- Right: cast + reel -->
  <div id="right-btns">
    <div class="touch-btn" id="btn-cast">🎣</div>
    
      <div class="touch-btn" id="btn-reel-in">▲<div class="btn-label">Enrouler</div></div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const msgEl      = document.getElementById('msg');
const scoreEl    = document.getElementById('score');
const scoreDeskEl= document.getElementById('score-desk');
const touchHud   = document.getElementById('touch-hud');
const uiEl       = document.getElementById('ui');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ── Touch detection ──
let isTouchDevice = false;
window.addEventListener('touchstart', () => {
  if (isTouchDevice) return;
  isTouchDevice = true;
  touchHud.classList.add('visible');
  uiEl.classList.add('touch-mode');
}, { passive: true });

// ── SEA ──
const TILE = 32;
const CA = ['#1565c0','#0d47a1','#1976d2','#0a4a8c'];
const CB = ['#00acc1','#00bcd4','#0097a7','#26c6da'];
let tiles = [];
function initTiles() {
  tiles = [];
  for (let r=0; r<Math.ceil(H/TILE)+2; r++)
    for (let c=0; c<Math.ceil(W/TILE)+2; c++)
      tiles.push({ x:c*TILE-TILE, y:r*TILE-TILE,
        colA:CA[Math.floor(Math.random()*CA.length)],
        colB:CB[Math.floor(Math.random()*CB.length)],
        t:Math.random()*Math.PI*2, speed:0.3+Math.random()*0.5 });
}
initTiles(); window.addEventListener('resize', initTiles);
function drawSea(dt) {
  for (const t of tiles) {
    t.t += dt*t.speed;
    ctx.fillStyle = Math.sin(t.t)>0 ? t.colA : t.colB;
    ctx.fillRect(t.x, t.y, TILE, TILE);
  }
}

// ── BOAT ──
const boat = { x:0, y:0 };
function initBoat() { boat.x=W/2; boat.y=H/2; }
initBoat(); window.addEventListener('resize', initBoat);
function drawBoat() {
  const bx=Math.round(boat.x), by=Math.round(boat.y);
  ctx.fillStyle='#8B4513'; ctx.fillRect(bx-24,by-8,48,20);
  ctx.fillStyle='#6B3410'; ctx.fillRect(bx-20,by+12,40,6);
  ctx.fillStyle='#D2691E'; ctx.fillRect(bx-18,by-14,36,10);
  ctx.fillStyle='#5C3317'; ctx.fillRect(bx-2,by-34,4,26);
  ctx.fillStyle='#FFFDE7'; ctx.fillRect(bx,by-32,16,20);
  ctx.fillStyle='#8B6914'; ctx.fillRect(bx+10,by-18,3,14);
}

// ── ROD ──
let mouse = { x:0, y:0 };
let hook={x:0,y:0}, hookVel={x:0,y:0}, hookActive=false, hookState='resting';

function getRodTip() { return {x:boat.x+22, y:boat.y-22}; }
function getRodDir() {
  const t=getRodTip(), dx=mouse.x-t.x, dy=mouse.y-t.y, l=Math.sqrt(dx*dx+dy*dy)||1;
  return {x:dx/l, y:dy/l};
}
function castLine() {
  if (hookActive) { hookActive=false; hookState='resting'; return; }
  const t=getRodTip(), d=getRodDir();
  hook.x=t.x+d.x*36; hook.y=t.y+d.y*36;
  hookVel.x=d.x*9; hookVel.y=d.y*9;
  hookActive=true; hookState='flying';
}
// Lance directement vers un point precis (tactile : tap = vise + lance)
function castToTarget(tx, ty) {
  if (hookActive) { hookActive=false; hookState='resting'; return; }
  mouse.x=tx; mouse.y=ty;
  const tip=getRodTip();
  const dx=tx-tip.x, dy=ty-tip.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=dx/dist, ny=dy/dist;
  const speed=Math.min(Math.max(dist/18, 6), 16);
  hook.x=tip.x+nx*36; hook.y=tip.y+ny*36;
  hookVel.x=nx*speed; hookVel.y=ny*speed;
  hookActive=true; hookState='flying';
}
function reelIn()  { if (hookActive && hookState==='resting') hookState='reeling'; }

function drawRod() {
  const t=getRodTip(), d=getRodDir();
  const re={x:t.x+d.x*32, y:t.y+d.y*32};
  ctx.strokeStyle='#A0522D'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(re.x,re.y); ctx.stroke();
  if (hookActive) {
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(re.x,re.y); ctx.lineTo(hook.x,hook.y); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.fillRect(Math.round(hook.x)-3,Math.round(hook.y)-3,6,6);
    ctx.fillStyle='#888'; ctx.fillRect(Math.round(hook.x)-2,Math.round(hook.y)+2,4,3);
  }
}

// ── FISH ──
const FNAMES=['Cabillaud 🐟','Saumon 🍣','Carpe 🐡','Sardine 🐠','Thon 🎣','Poisson-lune ✨','Mérou 🫧'];
const FCOLS =['#ff8c00','#e53935','#43a047','#7b1fa2','#0288d1','#f06292','#ffd600'];
let fishes=[];
function spawnFish() {
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=Math.random()*W;y=-20;}
  else if(side===1){x=W+20;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+20;}
  else{x=-20;y=Math.random()*H;}
  const tx=80+Math.random()*(W-160), ty=80+Math.random()*(H-160);
  const spd=0.4+Math.random()*0.6;
  const dx=tx-x,dy=ty-y,d=Math.sqrt(dx*dx+dy*dy)||1;
  fishes.push({x,y,vx:dx/d*spd,vy:dy/d*spd,tx,ty,
    col:FCOLS[Math.floor(Math.random()*FCOLS.length)],
    size:10+Math.floor(Math.random()*12),
    name:FNAMES[Math.floor(Math.random()*FNAMES.length)],
    wobble:Math.random()*Math.PI*2, alive:true});
}
function drawFish(f) {
  f.wobble+=0.08;
  const wo=Math.sin(f.wobble)*3, bx=Math.round(f.x), by=Math.round(f.y+wo), s=f.size;
  ctx.fillStyle=f.col;
  ctx.fillRect(bx-s,by-s/2,s*2,s);
  ctx.fillRect(bx-s-s/2,by-s/3,s/2,s/3*2-1);
  ctx.fillStyle='#000'; ctx.fillRect(bx+s/2,by-2,3,3);
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fillRect(bx-s/2,by,s,s/2-2);
}

// ── SCORE ──
let score=0, msgTimer=null;
function showMsg(text) {
  msgEl.textContent=text; msgEl.classList.add('show');
  clearTimeout(msgTimer); msgTimer=setTimeout(()=>msgEl.classList.remove('show'),2800);
}
function addScore(name) {
  score++; scoreEl.textContent=score; scoreDeskEl.textContent=score;
  showMsg('🎉 '+name+' attrapé !');
}

// ── KEYBOARD ──
const keys={};
window.addEventListener('keydown', e=>{keys[e.key]=true; e.preventDefault();});
window.addEventListener('keyup',   e=>{keys[e.key]=false;});

// ── MOUSE ──
window.addEventListener('mousemove', e=>{mouse.x=e.clientX; mouse.y=e.clientY;});
window.addEventListener('contextmenu', e=>{e.preventDefault(); castLine();});
window.addEventListener('wheel', e=>{ reelIn(); });

// ── JOYSTICK ──
const joyZone = document.getElementById('joystick-zone');
const joyBase = document.getElementById('joystick-base');
const joyKnob = document.getElementById('joystick-knob');
const KNOB_MAX=38;
let joyId=null, joyOrigin={x:0,y:0}, joyDir={x:0,y:0};

joyZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0]; joyId=t.identifier;
  const r=joyBase.getBoundingClientRect();
  joyOrigin={x:r.left+r.width/2, y:r.top+r.height/2};
},{passive:false});

// ── TOUCH AIM + CAST on canvas ──
// Un tap sur l'écran (hors HUD) = vise cet endroit ET lance l'hameçon jusqu'à là
const HUD_HEIGHT = 155;
let aimId = null;

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientY < H - HUD_HEIGHT && aimId===null) {
      aimId = t.identifier;
      // Met à jour le viseur immédiatement
      mouse.x = t.clientX; mouse.y = t.clientY;
      // Juste deplacer le viseur, pas lancer
    }
  }
},{passive:false});

window.addEventListener('touchmove', e=>{
  for (const t of e.changedTouches) {
    if (t.identifier===joyId) {
      const dx=t.clientX-joyOrigin.x, dy=t.clientY-joyOrigin.y;
      const dist=Math.sqrt(dx*dx+dy*dy), clamp=Math.min(dist,KNOB_MAX);
      const nx=dx/(dist||1), ny=dy/(dist||1), str=Math.min(dist/KNOB_MAX,1);
      joyKnob.style.transform=`translate(calc(-50% + ${nx*clamp}px), calc(-50% + ${ny*clamp}px))`;
      joyDir.x=nx*str; joyDir.y=ny*str;
    }
    if (t.identifier===aimId) {
      // Glisser le doigt déplace le viseur en temps réel
      mouse.x=t.clientX; mouse.y=t.clientY;
    }
  }
},{passive:false});

window.addEventListener('touchend', e=>{
  for (const t of e.changedTouches) {
    if (t.identifier===joyId) {
      joyId=null; joyDir={x:0,y:0};
      joyKnob.style.transform='translate(-50%,-50%)';
    }
    if (t.identifier===aimId) aimId=null;
  }
});

// ── TOUCH BUTTONS ──
function holdBtn(id, fn) {
  const el=document.getElementById(id); let iv=null;
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();el.classList.add('pressed');fn();iv=setInterval(fn,80);},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('pressed');clearInterval(iv);},{passive:false});
  el.addEventListener('touchcancel',e=>{el.classList.remove('pressed');clearInterval(iv);},{passive:false});
}
function tapBtn(id, fn) {
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();el.classList.add('pressed');fn();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('pressed');},{passive:false});
}
tapBtn('btn-cast',    castLine);
holdBtn('btn-reel-in',  reelIn);

// ── GAME LOOP ──
let lastTime=0, fishSpawnTimer=0;
const SPEED=2.8;

function update(dt) {
  let ax=0, ay=0;
  if (keys['ArrowLeft'] ||keys['a']) ax=-1;
  if (keys['ArrowRight']||keys['d']) ax= 1;
  if (keys['ArrowUp']   ||keys['w']) ay=-1;
  if (keys['ArrowDown'] ||keys['s']) ay= 1;
  if (joyDir.x||joyDir.y) { ax=joyDir.x; ay=joyDir.y; }
  boat.x=Math.max(30,Math.min(W-30, boat.x+ax*SPEED));
  boat.y=Math.max(30,Math.min(H-30, boat.y+ay*SPEED));

  if (hookActive) {
    if (hookState === 'flying') {
      hookVel.x *= 0.97; hookVel.y *= 0.97;
      hook.x += hookVel.x; hook.y += hookVel.y;
      hook.x = Math.max(8, Math.min(W-8, hook.x));
      hook.y = Math.max(8, Math.min(H-8, hook.y));
      if (Math.sqrt(hookVel.x**2+hookVel.y**2) < 0.5) hookState = 'resting';
    } else if (hookState === 'reeling') {
      const tip=getRodTip(), dx=tip.x-hook.x, dy=tip.y-hook.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if (dist < 22) { hookActive=false; }
      else { const spd=Math.min(dist*0.12,8); hook.x+=(dx/dist)*spd; hook.y+=(dy/dist)*spd; }
    }
  }

  fishSpawnTimer-=dt;
  if (fishSpawnTimer<=0) {
    if (fishes.filter(f=>f.alive).length<8) spawnFish();
    fishSpawnTimer=1.5+Math.random()*2;
  }
  for (const f of fishes) {
    if (!f.alive) continue;
    const dx=f.tx-f.x, dy=f.ty-f.y, d=Math.sqrt(dx*dx+dy*dy);
    if (d<10){f.tx=80+Math.random()*(W-160);f.ty=80+Math.random()*(H-160);}
    f.x+=f.vx; f.y+=f.vy;
    if (hookActive) {
      const hd=Math.sqrt((f.x-hook.x)**2+(f.y-hook.y)**2);
      if (hd<f.size+10) {
        f.alive=false; addScore(f.name);
        setTimeout(()=>{fishes=fishes.filter(x=>x!==f);},100);
        hookActive=false; casting=false;
      }
    }
  }
}

function draw(dt) {
  ctx.clearRect(0,0,W,H);
  drawSea(dt);
  for (const f of fishes) if (f.alive) drawFish(f);
  drawBoat(); drawRod();
  if (hookActive) {
    const r=6+Math.sin(Date.now()/200)*2;
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(hook.x,hook.y,r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.2;
    ctx.beginPath(); ctx.arc(hook.x,hook.y,r*1.7,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Touch crosshair viseur
  if (isTouchDevice) {
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(mouse.x-14,mouse.y); ctx.lineTo(mouse.x+14,mouse.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mouse.x,mouse.y-14); ctx.lineTo(mouse.x,mouse.y+14); ctx.stroke();
    ctx.strokeStyle='rgba(255,220,60,0.75)';
    ctx.beginPath(); ctx.arc(mouse.x,mouse.y,7,0,Math.PI*2); ctx.stroke();
  }
}

// Initialise le viseur devant le bateau (en haut a droite)
function resetMouseToBoat() { mouse.x=boat.x+100; mouse.y=boat.y-80; }
resetMouseToBoat();
window.addEventListener('resize', resetMouseToBoat);
function loop(ts) {
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  update(dt); draw(dt); requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTime=ts; loop(ts);});
</script>
</body>
</html>
